name: Validate Skill Pack

on:
  # This root safety scan must run for every repository change; path filters
  # would permit a new public file to bypass private-data validation.
  pull_request:
  push:
    branches: [main]

permissions:
  contents: read

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"
      - run: python -m pip install -e '.[dev]'
      - run: python -m pytest -v
      - run: python skill-pack/scripts/scan_private_identifiers.py .
