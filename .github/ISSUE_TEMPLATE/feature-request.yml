name: Improvement proposal
description: Propose a new capability or structural improvement
title: "[Proposal]: "
labels: [enhancement]
body:
  - type: textarea
    id: problem
    attributes:
      label: Problem and evidence
    validations:
      required: true
  - type: textarea
    id: scope
    attributes:
      label: Proposed scope
    validations:
      required: true
  - type: textarea
    id: tradeoffs
    attributes:
      label: Benefits, risks, counterarguments and rollback
    validations:
      required: true
