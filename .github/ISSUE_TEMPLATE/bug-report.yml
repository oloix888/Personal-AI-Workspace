name: Bug report
description: Report an error in the creator, documentation or validation
title: "[Bug]: "
labels: [bug]
body:
  - type: markdown
    attributes:
      value: Thanks for helping us improve Personal AI Workspace. Do not include secrets or private workspace data.
  - type: input
    id: version
    attributes:
      label: Creator version
      placeholder: v1.5.1
    validations:
      required: true
  - type: textarea
    id: problem
    attributes:
      label: What happened?
    validations:
      required: true
  - type: textarea
    id: expected
    attributes:
      label: What did you expect?
    validations:
      required: true
  - type: textarea
    id: evidence
    attributes:
      label: Reproduction steps and safe evidence
